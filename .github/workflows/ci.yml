name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  shared-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew :shared:jvmTest

  ios-framework:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64

  android-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew :androidApp:testDebugUnitTest

  android-assemble:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew :androidApp:assembleDebug

  ios-app:
    # macos-15+: the committed pbxproj uses project format 77, unreadable by
    # macos-14's Xcode 15.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - run: cp iosApp/Config/Supabase.xcconfig.example iosApp/Config/Supabase.xcconfig
      - name: Run iOS tests on first available iPhone simulator
        run: |
          DEVICE=$(xcrun simctl list devices available | grep -oE 'iPhone [0-9][^(]*' | head -1 | sed 's/ *$//')
          echo "Using simulator: $DEVICE"
          xcodebuild test \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -destination "platform=iOS Simulator,name=$DEVICE" \
            CODE_SIGNING_ALLOWED=NO

  version-tag-check:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag matches Config/Version.xcconfig
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          FILE=$(sed -n 's/^MARKETING_VERSION *= *//p' Config/Version.xcconfig | tr -d '[:space:]')
          if [ "$TAG" != "$FILE" ]; then
            echo "::error::Tag v$TAG does not match MARKETING_VERSION=$FILE in Config/Version.xcconfig"
            exit 1
          fi
          echo "Tag v$TAG matches Version.xcconfig"
